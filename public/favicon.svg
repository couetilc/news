<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="News — an N-shaped magnet">
    <!--
        Brand mark (issue #306): the letter "N" rendered as a classic magnet,
        tying the icon to the "News" nameplate. The N's three strokes form the
        magnet body in the classic magnet red (brand accent #8b1a1a); the two
        upward-pointing tips are capped in contrasting metallic "poles" — the
        universal magnet cue — so it reads as a magnet, not just a letter.
        Hand-authored, no generator. Tuned to stay legible at 16x16: bold even
        strokes, high contrast, no fine detail. viewBox 0 0 32 32 so the
        geometry maps cleanly to icon pixels.
    -->
    <!-- Paper-tinted plate so the mark has a defined edge on any tab background. -->
    <rect width="32" height="32" rx="4" fill="#f7f5ef" />
    <!--
        The N body: left post, diagonal, right post, drawn as one bold red stroke.
        Strokes are thick (5px on a 32 grid) for 16px legibility; butt-capped at
        the tops so the metallic pole caps sit flush on the two posts.
    -->
    <g fill="none" stroke="#8b1a1a" stroke-width="5" stroke-linecap="butt" stroke-linejoin="miter">
        <!-- left vertical post -->
        <path d="M7.5 9 V26" />
        <!-- diagonal limb of the N -->
        <path d="M7.5 7 L24.5 25" />
        <!-- right vertical post -->
        <path d="M24.5 9 V26" />
    </g>
    <!--
        Metallic pole caps on the two upward tips (the magnet's poles). Steel grey
        with a darker ink edge so they read as polished metal against the red body
        even at favicon size; a lighter highlight strip suggests a reflective face.
    -->
    <g stroke="#17150f" stroke-width="1">
        <rect x="3.5" y="4" width="8" height="5" rx="1" fill="#9a9a9a" />
        <rect x="20.5" y="4" width="8" height="5" rx="1" fill="#9a9a9a" />
    </g>
    <g fill="#e8e8e8">
        <rect x="4.5" y="4.8" width="6" height="1.3" rx="0.6" />
        <rect x="21.5" y="4.8" width="6" height="1.3" rx="0.6" />
    </g>
</svg>
