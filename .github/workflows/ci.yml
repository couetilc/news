name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so gitleaks can scan the full commit history below, not
      # just the shallow default checkout (depth 1).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Secret scan: download the pinned gitleaks binary (matches the version
      # vendored in the agent container) and scan the git history directly,
      # failing the job on any detected secret. We invoke the binary rather than
      # gitleaks/gitleaks-action to avoid that action's GITLEAKS_LICENSE
      # ambiguity for org-owned repos.
      - name: Scan for secrets (gitleaks)
        env:
          GITLEAKS_VERSION: 8.29.0
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks version
          /tmp/gitleaks git . --redact --exit-code 1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # Apply any pending D1 migrations before the new code that expects them
      # deploys. Reads wrangler.jsonc directly (d1 commands ignore the
      # dist/server/wrangler.json deploy redirect), so order vs. build is moot;
      # what matters is this runs before the deploy below.
      - run: npx wrangler d1 migrations apply NEWS_DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Uses the repo's wrangler from node_modules and the config redirect
      # `astro build` emits (dist/server/wrangler.json). account_id lives in
      # wrangler.jsonc; only the API token is secret.
      # Pinned to v4.0.0+: its action.yml declares `runs.using: node24`, so the
      # deploy no longer triggers GitHub's "Node.js 20 is deprecated" warning.
      # The repo uses its own wrangler from node_modules, so v4's bumped default
      # Wrangler CLI version doesn't affect this deploy.
      - uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
