name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 so gitleaks can scan the full commit history below, not
      # just the shallow default checkout (depth 1).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Secret scan: download the pinned gitleaks binary (matches the version
      # vendored in the agent container) and scan the git history directly,
      # failing the job on any detected secret. We invoke the binary rather than
      # gitleaks/gitleaks-action to avoid that action's GITLEAKS_LICENSE
      # ambiguity for org-owned repos.
      - name: Scan for secrets (gitleaks)
        env:
          GITLEAKS_VERSION: 8.29.0
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks version
          /tmp/gitleaks git . --redact --exit-code 1
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  # Playwright e2e smoke (issue #77). ADVISORY for now: a SEPARATE job that is NOT
  # a `needs:` of `deploy`, and `continue-on-error: true` so a failure reports red
  # on the run without blocking the merge/deploy. This suite still flakes under
  # `astro dev`/workerd sequential load (config sets retries:1 in CI to trim that);
  # graduate it to a blocking gate once it's stable and timed. The config's
  # `webServer` builds the schema (local D1 migrations) and starts `astro dev`, so
  # there is no separate build/serve step here — just install the browser and run.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # System deps + the Chromium build the pinned @playwright/test expects. (The
      # agent container bakes its own browser at PLAYWRIGHT_BROWSERS_PATH; CI does not.)
      - run: npx playwright install --with-deps chromium
      # GitHub sets CI=true, which flips playwright.config.ts to retries:1 + the
      # json/github reporters. Chromium runs --no-sandbox via the config's launchOptions.
      - run: npm run test:e2e
      # Machine-readable result + traces for review tooling to diff run-over-run
      # (new failures vs. known flakes). `always()` so it uploads even when the
      # suite fails. `if-no-files-found: ignore` since playwright-report may be
      # absent if the run dies before any reporter writes.
      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # Apply any pending D1 migrations before the new code that expects them
      # deploys. Reads wrangler.jsonc directly (d1 commands ignore the
      # dist/server/wrangler.json deploy redirect), so order vs. build is moot;
      # what matters is this runs before the deploy below.
      - run: npx wrangler d1 migrations apply NEWS_DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Uses the repo's wrangler from node_modules and the config redirect
      # `astro build` emits (dist/server/wrangler.json). account_id lives in
      # wrangler.jsonc; only the API token is secret.
      # Pinned to v4.0.0+: its action.yml declares `runs.using: node24`, so the
      # deploy no longer triggers GitHub's "Node.js 20 is deprecated" warning.
      # The repo uses its own wrangler from node_modules, so v4's bumped default
      # Wrangler CLI version doesn't affect this deploy.
      - uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
