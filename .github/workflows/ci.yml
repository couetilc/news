name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  # GitHub forces JS actions onto Node 24 from 2026-06-16; wrangler-action@v3
  # still declares Node 20. Opt in early so breakage surfaces in a PR, not on
  # the forced-switch date.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # Apply any pending D1 migrations before the new code that expects them
      # deploys. Reads wrangler.jsonc directly (d1 commands ignore the
      # dist/server/wrangler.json deploy redirect), so order vs. build is moot;
      # what matters is this runs before the deploy below.
      - run: npx wrangler d1 migrations apply NEWS_DB --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Uses the repo's wrangler from node_modules and the config redirect
      # `astro build` emits (dist/server/wrangler.json). account_id lives in
      # wrangler.jsonc; only the API token is secret.
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
