# Out-of-band ADVISORY Playwright e2e smoke (issues #77, #256).
#
# Extracted from ci.yml into its own workflow so the heavy-run review detector
# (.claude/skills/review-merged-prs/scripts/test-runs-needing-review.sh) can find
# it: that detector selects runs by workflowName matching
# `mutation|stryker|e2e|playwright|fuzz` and defaults to `schedule` events, then
# keys a per-kind reviewed-marker off a slug of the workflow name. As an `e2e`
# job inside the generic `CI` workflow it was invisible to that loop; as its own
# `E2E (advisory)` workflow it is discoverable and `--mark`-able exactly like the
# mutation runs. Mirrors mutation.yml's advisory-out-of-band structure.
#
# Stays ADVISORY: `continue-on-error: true`, NOT a required status check, NOT a
# `needs:` of deploy — a failure reports red on the run without blocking
# merge/deploy. Graduate it to a blocking gate once it's stable and timed (the
# advisory→blocking path the testing skill names).
#
# Triggers:
#   • pull_request     — a per-PR advisory smoke run.
#   • schedule         — a nightly sweep, so the detector (default event:
#     schedule) surfaces a baseline→delta run-over-run report.
#   • workflow_dispatch — on demand.
name: E2E (advisory)

on:
  pull_request:
  schedule:
    # 07:30 UTC nightly — after most days' merges, off the deploy path, and just
    # after the mutation sweep (07:00) so the two advisory reports land together.
    - cron: '30 7 * * *'
  workflow_dispatch:

# Don't pile up advisory runs: a newer push to the same ref supersedes an
# in-flight run. Never cancel the nightly/dispatch sweeps mid-run.
concurrency:
  group: e2e-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Playwright e2e smoke (issue #77). ADVISORY for now: NOT a `needs:` of
  # `deploy`, and `continue-on-error: true` so a failure reports red on the run
  # without blocking the merge/deploy. This suite still flakes under
  # `astro dev`/workerd sequential load (config sets retries:1 in CI to trim that);
  # graduate it to a blocking gate once it's stable and timed. The config's
  # `webServer` builds the schema (local D1 migrations) and starts `astro dev`, so
  # there is no separate build/serve step here — just install the browser and run.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # System deps + the Chromium build the pinned @playwright/test expects. (The
      # agent container bakes its own browser at PLAYWRIGHT_BROWSERS_PATH; CI does not.)
      - run: npx playwright install --with-deps chromium
      # GitHub sets CI=true, which flips playwright.config.ts to retries:1 + the
      # json/github reporters. Chromium runs --no-sandbox via the config's launchOptions.
      - run: npm run test:e2e
      # Machine-readable result + traces for review tooling to diff run-over-run
      # (new failures vs. known flakes). `always()` so it uploads even when the
      # suite fails. `if-no-files-found: ignore` since playwright-report may be
      # absent if the run dies before any reporter writes.
      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
