# Out-of-band Playwright e2e smoke (issues #77, #256).
#
# Extracted from ci.yml into its own workflow so the heavy-run review detector
# (.claude/skills/review-merged-prs/scripts/test-runs-needing-review.sh) can find
# it: that detector selects runs by workflowName matching
# `mutation|stryker|e2e|playwright|fuzz` and defaults to `schedule` events, then
# keys a per-kind reviewed-marker off a slug of the workflow name. As an `e2e`
# job inside the generic `CI` workflow it was invisible to that loop; as its own
# workflow it is discoverable and `--mark`-able exactly like the mutation runs.
# Mirrors mutation.yml's out-of-band structure.
#
# BLOCKING PR GATE (issue #279, no longer advisory). #257/#277 stabilized the
# suite (built worker via `astro preview`), so the pull_request job dropped its
# `continue-on-error: true` mask — a real e2e failure now reports red honestly
# and fails the check (`retries: 1` stays in playwright.config.ts as a thin
# ride-out for residual noise during the initial promotion). NOTE the workflow
# name is intentionally still `E2E (advisory)`: renaming it would change the
# check-name slug (`e2e-advisory`) the heavy-run review detector keys off
# (#227); a clean rename — which must update that detector slug too — is a
# deliberate follow-up. ACTIVATION: a failing check only *blocks* merge once
# `e2e` is added as a required status check in the `protect-main` ruleset, a
# repo-admin step for Connor (recommended: watch a few green PR runs first).
# The scheduled sweep stays out-of-band (NOT a `needs:` of deploy); its #262
# change-gate below is unchanged.
#
# Triggers:
#   • pull_request     — a per-PR smoke run (blocking once required in the ruleset).
#   • schedule         — a nightly sweep, so the detector (default event:
#     schedule) surfaces a baseline→delta run-over-run report. Additionally
#     CHANGE-GATED in-job against the last successful run's SHA (skip when
#     nothing relevant changed) — mirrors mutation.yml.
#   • workflow_dispatch — on demand.
name: E2E (advisory)

on:
  pull_request:
  schedule:
    # 07:30 UTC nightly — after most days' merges, off the deploy path, and just
    # after the mutation sweep (07:00) so the two advisory reports land together.
    - cron: '30 7 * * *'
  workflow_dispatch:

# Don't pile up advisory runs: a newer push to the same ref supersedes an
# in-flight run. Never cancel the nightly/dispatch sweeps mid-run.
concurrency:
  group: e2e-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  # The scheduled change-gate lists this workflow's prior runs via the
  # workflow-runs REST API (gh api .../actions/workflows/e2e.yml/runs); that
  # needs Actions read. Without it the call fails and the gate falls back to
  # running the full sweep every night (issue #270).
  actions: read

jobs:
  # Playwright e2e smoke (issue #77). BLOCKING PR gate (issue #279): NO
  # `continue-on-error`, so a failure fails this job's check honestly. Still NOT a
  # `needs:` of `deploy` — it gates merge (once required in the `protect-main`
  # ruleset), not the deploy step. #257/#277 stabilized the suite by serving a
  # built worker via `astro preview`; `retries: 1` stays in playwright.config.ts
  # as a thin ride-out for residual noise. The config's `webServer` builds the
  # schema (local D1 migrations) and serves the built worker, so there is no
  # separate build/serve step here — just install the browser and run.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 so the scheduled change-gate can `git diff` against an
          # arbitrary earlier SHA (the last successful run), not just HEAD~1.
          fetch-depth: 0

      # CHANGE-GATE (scheduled runs only). A nightly sweep is wasted work when no
      # relevant input changed since the last green run. Resolve the head SHA of
      # the most recent successful run of THIS workflow and diff against it over
      # the inputs that can affect e2e results; if nothing changed, skip the rest
      # of the job. pull_request/dispatch runs skip this step (PR advisory runs
      # always; dispatch is an explicit human request — always run). Mirrors
      # mutation.yml's change-gate step.
      - name: Change-gate (scheduled)
        id: gate
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Capture the API call's exit status separately so a real auth/API
          # failure is visible in the log rather than masquerading as "no prior
          # run" (issue #270). Either way we fall through to running the sweep —
          # the safe default — so the gate's behavior is unchanged.
          if last_sha="$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/e2e.yml/runs?status=success&event=schedule&per_page=1" \
            --jq '.workflow_runs[0].head_sha' 2>/dev/null)"; then
            api_ok=1
          else
            api_ok=0
            last_sha=""
          fi
          if [ "$api_ok" = "0" ]; then
            echo "::warning::Could not query prior workflow runs (gh api failed — check the workflow's actions:read permission). Running the full sweep to be safe."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$last_sha" ] || [ "$last_sha" = "null" ]; then
            echo "No prior successful scheduled run — running the full sweep."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git cat-file -e "${last_sha}^{commit}" 2>/dev/null; then
            if git diff --quiet "$last_sha" HEAD -- src test e2e '*.config.ts' package.json package-lock.json .github/workflows/e2e.yml; then
              echo "No relevant change since $last_sha — skipping the nightly sweep."
              echo "run=false" >> "$GITHUB_OUTPUT"
            else
              echo "Relevant change since $last_sha — running."
              echo "run=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Last SHA $last_sha not in history (force-push?) — running to be safe."
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      # `should_run` is true unless the scheduled change-gate explicitly skipped.
      - name: Decide whether to run
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.gate.outputs.run }}" = "false" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.decide.outputs.should_run == 'true'
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: steps.decide.outputs.should_run == 'true'
      # System deps + the Chromium build the pinned @playwright/test expects. (The
      # agent container bakes its own browser at PLAYWRIGHT_BROWSERS_PATH; CI does not.)
      - run: npx playwright install --with-deps chromium
        if: steps.decide.outputs.should_run == 'true'
      # GitHub sets CI=true, which flips playwright.config.ts to retries:1 + the
      # json/github reporters. Chromium runs --no-sandbox via the config's launchOptions.
      - run: npm run test:e2e
        if: steps.decide.outputs.should_run == 'true'
      # Machine-readable result + traces for review tooling to diff run-over-run
      # (new failures vs. known flakes). `always()` so it uploads even when the
      # suite fails. `if-no-files-found: ignore` since playwright-report may be
      # absent if the run dies before any reporter writes.
      - name: Upload e2e report
        if: steps.decide.outputs.should_run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
